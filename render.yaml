services:
  # ---------------------------------------------------------------------------
  # Backend — FastAPI RAG service
  # ---------------------------------------------------------------------------
  - type: web
    name: rag-mvp-backend
    plan: free
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: QDRANT_URL
        # Option A (recommended): point to Qdrant Cloud
        #   value: https://<your-cluster>.cloud.qdrant.io:6333
        # Option B: point to the private Qdrant service below (requires paid plan)
        #   fromService:
        #     name: rag-mvp-qdrant
        #     type: pserv
        #     property: hostport
        value: ""          # Fill in Render UI — see DEPLOY_RENDER.md
      - key: QDRANT_API_KEY
        value: ""          # Fill in Render UI (Qdrant Cloud API key; leave empty for local)
      - key: EMBEDDING_MODEL
        value: BAAI/bge-small-en-v1.5
      - key: COLLECTION_NAME
        value: rag_docs

  # ---------------------------------------------------------------------------
  # Qdrant — private vector-database service
  #
  # NOTE: Private Services (type: pserv) require a paid Render plan.
  # On the free tier, use Qdrant Cloud instead (see DEPLOY_RENDER.md, Option A).
  # Uncomment the block below only if you have a paid Render account.
  # ---------------------------------------------------------------------------
  # - type: pserv
  #   name: rag-mvp-qdrant
  #   plan: starter          # cheapest paid plan (~$7/mo)
  #   runtime: image
  #   image:
  #     url: docker.io/qdrant/qdrant:v1.11.0
  #   ports:
  #     - port: 6333
  #       protocol: tcp
