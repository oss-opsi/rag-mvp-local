services:
  # -----------------------------------------------------------------------
  # Qdrant vector database
  # -----------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.11.0
    container_name: rag_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      # Qdrant image has no curl/wget; use bash's /dev/tcp to probe the port
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # -----------------------------------------------------------------------
  # FastAPI backend
  # -----------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag_backend
    ports:
      - "8000:8000"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-rag_documents}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - BM25_CORPUS_FILE=/data/bm25_corpus.pkl
    volumes:
      - backend_data:/data
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      # Use Python (always present in the backend image) since curl is not installed
      test: ["CMD-SHELL", "python -c 'import urllib.request,sys; sys.exit(0 if urllib.request.urlopen(\"http://localhost:8000/health\", timeout=5).status==200 else 1)' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # -----------------------------------------------------------------------
  # Streamlit frontend
  # -----------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rag_frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  qdrant_storage:
    driver: local
  backend_data:
    driver: local
